<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Omnibees Roadmap</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #fcfcfc;
  --white: #ffffff;
  --dark: #273240;
  --mid: #4A5568;
  --muted: #9C9C9C;
  --border: #E6E6E6;
  --accent: #273240;
  --now-bg: #273240;
  --now-text: #ffffff;
  --next-bg: #ffffff;
  --next-text: #273240;
  --future-bg: #F5F5F5;
  --future-text: #273240;
  --risk-red: #e63946;
  --risk-orange: #f4a261;
  --risk-yellow: #fec437;
  --progress-bg: #E6E6E6;
  --progress-fill: #273240;
  --brand: #fec437;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--dark);
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  min-height: 100vh;
}

/* ── LOGIN ── */
#loginScreen {
  position: fixed; inset: 0;
  background: #fcfcfc;
  display: flex;
  z-index: 100;
  transition: opacity .5s, visibility .5s;
}
#loginScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

/* Left panel — illustration */
.login-left {
  flex: 1;
  background: linear-gradient(135deg, #F5F5F5 0%, #E6E6E6 50%, #D9D9D9 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px;
  position: relative;
  overflow: hidden;
}
.login-left::before {
  content: '';
  position: absolute;
  top: -120px; right: -120px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(254,196,55,.15) 0%, transparent 70%);
  border-radius: 50%;
}
.login-left::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -80px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(78,64,118,.08) 0%, transparent 70%);
  border-radius: 50%;
}
.login-illustration {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 520px;
}
.login-illustration svg {
  width: 100%;
  height: auto;
}
.login-left-title {
  position: relative;
  z-index: 1;
  font-family: 'Open Sans', sans-serif;
  font-weight: 700;
  font-size: 1.8rem;
  color: #273240;
  margin-bottom: 12px;
  text-align: center;
}
.login-left-desc {
  position: relative;
  z-index: 1;
  font-family: 'Open Sans', sans-serif;
  font-size: .9rem;
  color: #6b7280;
  text-align: center;
  max-width: 380px;
  line-height: 1.6;
}

/* Right panel — form */
.login-right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fcfcfc;
  padding: 40px;
}
.login-box {
  width: 410px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.login-logo img {
  height: 48px;
}
.login-card {
  width: 100%;
  background: #fff;
  border: 1px solid #e6e6e6;
  border-radius: 4px;
  padding: 30px;
}
.login-title {
  font-family: 'Open Sans', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: #273240;
  line-height: 30px;
  margin-bottom: 5px;
}
.login-sub {
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  color: #273240;
  line-height: 20px;
  margin-bottom: 20px;
}
.login-field {
  position: relative;
  width: 100%;
  margin-bottom: 20px;
}
.login-field label {
  position: absolute;
  top: -8px;
  left: 15px;
  background: #fff;
  padding: 0 5px;
  font-family: 'Open Sans', sans-serif;
  font-size: 10px;
  color: #4A5568;
  line-height: 20px;
  z-index: 1;
}
.login-input {
  width: 100%;
  height: 48px;
  background: #fff;
  border: 1px solid #c5c5c5;
  border-radius: 4px;
  padding: 0 15px;
  color: #273240;
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  outline: none;
  letter-spacing: 3px;
  transition: border-color .2s;
}
.login-input:focus { border-color: #4A5568; }
.login-input::placeholder { color: #c5c5c5; letter-spacing: 0; }
.login-btn {
  width: 100%;
  height: 32px;
  background: #fec437;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
  line-height: 20px;
}
.login-btn:hover { opacity: .88; }
.login-error {
  color: #e63946;
  font-family: 'Open Sans', sans-serif;
  font-size: 11px;
  margin-top: 8px;
  display: none;
}
.login-error.show { display: block; }

/* Responsive: hide left panel on small screens */
@media (max-width: 900px) {
  .login-left { display: none; }
  .login-right { flex: 1; }
}

/* ── APP ── */
#app { display: none; min-height: 100vh; }

/* ── HEADER ── */
header {
  background: #ffffff;
  color: #273240;
  padding: 0 20px;
  height: 57px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
  border-bottom: 1px solid #e6e6e6;
  font-family: 'Open Sans', sans-serif;
}
.logo {
  font-family: 'Open Sans', sans-serif;
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo span { color: #fec437; }
.header-meta { display: flex; align-items: center; gap: 15px; }
.header-date { font-size: 11px; color: #9c9c9c; font-family: 'Open Sans', sans-serif; }
.header-refresh-info { font-size: 11px; color: #9c9c9c; white-space: nowrap; font-family: 'Open Sans', sans-serif; }
.header-btn {
  background: #fff;
  border: 1px solid #c5c5c5;
  color: #273240;
  padding: 7px 14px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Open Sans', sans-serif;
  transition: border-color .2s, background .2s;
  display: flex; align-items: center; gap: 5px;
  height: 32px;
}
.header-btn:hover { border-color: #c5c5c5; background: #e6e6e6; }
.header-btn-icon { width: 32px; padding: 8px; justify-content: center; }
.header-btn-icon svg { flex-shrink: 0; }

/* ── PIVOT SETTINGS POPOVER ── */
.pivot-settings-wrap { position: relative; }
.pivot-popover {
  display: none;
  position: absolute; top: calc(100% + 10px); right: 0;
  width: 320px;
  background: #ffffff;
  border: 1px solid #e6e6e6;
  border-radius: 4px;
  padding: 14px 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,.1);
  z-index: 200;
}
.pivot-popover.open { display: block; }
.pivot-popover-title {
  font-family: 'Open Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: #273240; margin-bottom: 10px;
}
.pivot-popover label {
  display: block;
  font-family: 'Open Sans', sans-serif;
  font-size: 11px; color: #9c9c9c; margin-bottom: 5px;
}
.pivot-popover input {
  width: 100%; box-sizing: border-box;
  background: #fff; border: 1px solid #c5c5c5;
  border-radius: 4px; padding: 7px 10px;
  font-family: 'Open Sans', sans-serif;
  font-size: 12px; color: #273240;
  outline: none; transition: border-color .2s;
}
.pivot-popover input:focus { border-color: #4A5568; }
.pivot-popover-btns {
  display: flex; gap: 8px; margin-top: 10px;
}
.pivot-popover-btns button {
  flex: 1; padding: 7px 10px;
  border-radius: 4px; border: none; cursor: pointer;
  font-family: 'Open Sans', sans-serif;
  font-size: 11px; font-weight: 600;
  transition: opacity .15s;
}
.pivot-popover-btns button:hover { opacity: .85; }
.btn-pivot-save    { background: #fec437; color: #fff; }
.btn-pivot-reset   { background: transparent; border: 1px solid #c5c5c5 !important; color: #273240; }
.pivot-popover-hint {
  font-size: 10px; color: #9c9c9c; margin-top: 8px; line-height: 1.4;
  font-family: 'Open Sans', sans-serif;
}

/* ── MAIN ── */
main { padding: 48px; }

/* ── SECTION TITLE ── */
.section-label {
  font-family: 'Open Sans', sans-serif;
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── PILLS ── */
.meta-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 99px;
  font-family: 'Open Sans', sans-serif;
  letter-spacing: .5px;
  white-space: nowrap;
  display: inline-block;
}
.pill-current { background: #273240; color: #fff; }
.pill-next    { background: var(--border); color: var(--dark); }
.pill-future  { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.pill-past    { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }

/* ── SEPARADOR DETALHE DAS METAS ── */
.detail-section-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 16px 0 0;
  padding: 10px 24px 12px;
  background: #fff;
  border: 1px solid #e6e6e6;
  border-radius: 16px 16px 0 0;
  border-bottom: 1px solid #e6e6e6;
}
.detail-section-title {
  font-family: 'Open Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 4px;
  color: #273240;
  white-space: nowrap;
}

/* ── MATRIX ── */
.matrix-wrap {
  overflow: auto;
  max-height: calc(100vh - 64px);
  margin-bottom: 48px;
  border: 1px solid #e6e6e6;
  border-top: none;
  border-radius: 0 0 16px 16px;
  background: #fff;
}
.matrix-grid {
  display: grid;
  gap: 0;
  min-width: max-content;
}
/* Header row */
.matrix-squad-header {
  position: sticky; top: 0; left: 0; z-index: 3;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.matrix-col-header {
  position: sticky; top: 0; z-index: 2;
  background: #fafaf8;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 10px 14px 9px;
  display: flex; align-items: center; gap: 8px; justify-content: center;
}
.matrix-col-header.past    { background: #f0fdf4; border-bottom-color: #d1fae5; }
.matrix-col-header.current { background: #fec437; border-color: #e5b032; }
.matrix-col-header.future  { background: #F5F5F5; border-bottom-color: #E6E6E6; }
.matrix-col-header.current .meta-col-dates,
.matrix-col-header.current .meta-col-period { color: #5a4e3a; }
.matrix-col-header.past { opacity: 0.75; }
.matrix-col-header.current .meta-col-num { color: #273240; }
.matrix-col-header.past .meta-col-num { color: #166534; }
.matrix-col-header .meta-pill { margin-left: auto; }
.meta-col-num {
  font-family: 'Open Sans', sans-serif;
  font-size: .88rem;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.meta-col-period {
  font-size: .65rem;
  color: var(--muted);
}
.meta-col-dates {
  font-size: .65rem;
  color: var(--muted);
}
/* Squad label column */
.matrix-squad-label {
  position: sticky; left: 0; z-index: 2;
  background: var(--white);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-left: 4px solid transparent;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 180px;
}
.squad-name {
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  line-height: 1.3;
  color: #273240;
}
.squad-name-main {
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  line-height: 1.2;
  color: #273240;
}
.squad-name-sub {
  font-family: 'Open Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: #273240;
  line-height: 1.2;
}
.squad-name-wrap {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.squad-team-info {
  font-family: 'Open Sans', sans-serif;
  font-size: 9.5px;
  font-style: italic;
  color: #9ca3af;
  line-height: 1.3;
  margin-top: 3px;
}
/* Data cells */
.matrix-cell {
  background: var(--white);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  min-height: 60px;
  transition: box-shadow .3s;
}
.matrix-cell.cell-past { opacity: 0.7; background: var(--bg); }
.matrix-cell.cell-future { background: #F5F5F5; }
@keyframes cell-flash {
  0%   { box-shadow: inset 0 0 0 3px #fec437, 0 0 0 4px rgba(254,196,55,.3); }
  70%  { box-shadow: inset 0 0 0 3px #fec437, 0 0 0 4px rgba(254,196,55,.10); }
  100% { box-shadow: inset 0 0 0 0px transparent, 0 0 0 0px transparent; }
}
.matrix-cell.cell-highlight {
  animation: cell-flash 1.6s ease-out forwards;
}
.matrix-cell-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60px;
  color: var(--border);
  font-size: 1.2rem;
}
.squad-count {
  font-size: .7rem;
  color: var(--muted);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 99px;
  margin-left: auto;
  white-space: nowrap;
}

/* ── EPIC ROW ── */
.epic-row {
  padding: 12px 18px;
  border-bottom: 1px solid #f5f4f0;
  display: flex; flex-direction: column; gap: 8px;
  border-left: 3px solid transparent;
}
.epic-row:last-child { border-bottom: none; }

/* ── STATUS COLOR GROUPS ── */
/* Group 0 — Live: verde vivo, topo da lista */
.st-live {
  border-left-color: #16a34a;
  background: #f0fdf4;
}
.st-live .epic-status  { background: #dcfce7; color: #15803d; }
.st-live .progress-fill { background: #16a34a; }
.st-live .epic-name    { font-weight: 600; }

/* Group 1 — Released: verde médio */
.st-released {
  border-left-color: #22c55e;
  background: #f7fef9;
}
.st-released .epic-status  { background: #dcfce7; color: #16a34a; }
.st-released .progress-fill { background: #22c55e; }

/* Group 2 — Pronto para Release: verde suave */
.st-ready-rel {
  border-left-color: #86efac;
}
.st-ready-rel .epic-status  { background: #f0fdf4; color: #15803d; }
.st-ready-rel .progress-fill { background: #4ade80; }

/* Group 3 — Em desenvolvimento: azul */
.st-in-dev {
  border-left-color: #3b82f6;
}
.st-in-dev .epic-status  { background: #eff6ff; color: #2563eb; }
.st-in-dev .progress-fill { background: #3b82f6; }

/* Group 4 — Pronto para desenvolvimento: azul projecto */
.st-ready-dev {
  border-left-color: #60a5fa;
}
.st-ready-dev .epic-status  { background: #eff6ff; color: #1d4ed8; }
.st-ready-dev .progress-fill { background: #60a5fa; }

/* Group 5 — Análise/Estudo: cinzento, fundo ao fim */
.st-analysis {
  border-left-color: #d1d5db;
  opacity: 0.72;
}
.st-analysis .epic-status  { background: #f3f4f6; color: #6b7280; }
.st-analysis .progress-fill { background: #9ca3af; }

.epic-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
.epic-name {
  font-size: 12px;
  font-weight: 500;
  line-height: 1.35;
  flex: 1;
  word-break: break-word;
  overflow-wrap: break-word;
  min-width: 0;
}
.risk-badge {
  display: flex; align-items: center; gap: 4px;
  font-size: .68rem;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.risk-urgent    { background: #fecaca; color: #991b1b; }
.risk-unplanned { background: #fce8ea; color: var(--risk-red); }
.risk-atrisk    { background: #fef3e2; color: #c76b00; }
.risk-long      { background: #fefae0; color: #997000; }

.epic-bottom {
  display: flex; align-items: center; gap: 10px;
}
.epic-status {
  font-size: .7rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}
.progress-bar {
  flex: 1;
  height: 4px;
  background: var(--progress-bg);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--dark);
  border-radius: 99px;
  transition: width .4s ease;
}
.progress-pct {
  font-size: .68rem;
  color: var(--muted);
  min-width: 28px;
  text-align: right;
}

/* ── LOADING ── */
.loading {
  text-align: center;
  padding: 80px;
  color: var(--muted);
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--dark);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ERROR ── */
.error-box {
  background: #fce8ea;
  border: 1px solid #f5c0c4;
  border-radius: 10px;
  padding: 20px 24px;
  color: var(--risk-red);
  font-size: .85rem;
  margin-bottom: 24px;
  display: none;
}
.error-box.show { display: block; }

/* ── EMPTY ── */
.empty-squad {
  padding: 20px 18px;
  font-size: .8rem;
  color: var(--muted);
  text-align: center;
  font-style: italic;
}

/* ── LOGO ── */
.logo { display: flex; align-items: center; gap: 10px; }
.logo-img { height: 36px; width: auto; object-fit: contain; }
.logo-roadmap {
  font-family: 'Open Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: #273240;
  border-left: 1px solid #e6e6e6;
  padding-left: 10px;
  line-height: 1;
}

/* ── TIMELINE STRIP (header fino acima dos highlights) ── */
.timeline-strip {
  background: #fff;
  border: 1px solid #e6e6e6;
  border-radius: 16px;
  padding: 8px 24px 10px;
  margin-bottom: 16px;
}
.timeline-strip-months {
  position: relative;
  height: 12px;
  margin-bottom: 2px;
}
.timeline-month-label {
  position: absolute;
  font-size: .55rem;
  color: #9c9c9c;
  transform: translateX(-50%);
}
.timeline-today-label {
  position: absolute;
  top: 0;
  font-size: .55rem;
  color: #4A5568;
  font-weight: 700;
  transform: translateX(-50%);
  white-space: nowrap;
}
.timeline-strip-rows {
  position: relative;
}
.timeline-row {
  position: relative;
  height: 18px;
  cursor: pointer;
}
.timeline-month-sep {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: #e6e6e6;
}
.timeline-bar {
  position: absolute;
  top: 2px; bottom: 2px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-family: 'Open Sans', sans-serif;
  font-size: .65rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  cursor: pointer;
  transition: opacity .15s;
}
.timeline-bar:hover { opacity: .78; }
.timeline-bar.past    { background: #e6e6e6; color: #9c9c9c; }
.timeline-bar.current { background: #fec437; color: #273240; }
.timeline-bar.future  { background: #f5f5f5; color: #9c9c9c; border: 1px dashed #c5c5c5; }
.timeline-today-line {
  position: absolute;
  top: -2px; bottom: -2px;
  width: 2px;
  background: #4A5568;
  border-radius: 2px;
  z-index: 5;
}

/* ── EXPANDÍVEL "ver mais detalhes" (épicos internos) ── */
.internal-expand-wrap {
  border-top: 1px solid var(--border);
}
.btn-internal-toggle {
  width: 100%;
  padding: 7px 14px;
  display: flex; align-items: center; gap: 6px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: .68rem;
  font-family: 'Open Sans', sans-serif;
  font-weight: 600;
  color: var(--muted);
  text-align: left;
  transition: color .15s, background .15s;
}
.btn-internal-toggle:hover { color: var(--mid); background: var(--bg); }
.btn-internal-toggle.open  { color: var(--mid); }
.toggle-chevron {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px;
  transition: transform .2s;
  flex-shrink: 0;
}
.toggle-chevron svg { width: 12px; height: 12px; }
.btn-internal-toggle.open .toggle-chevron { transform: rotate(180deg); }
.toggle-text { flex: 1; }
.internal-epics-panel {
  display: none;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 4px 0 6px;
}
.internal-epics-panel.expanded { display: block; }
.internal-epics-panel .epic-row { opacity: .85; }

/* ── FEATURES TOGGLE ── */
.epic-row { cursor: default; }
.epic-toggle-btn {
  background: none; border: none; cursor: pointer;
  padding: 2px 4px; margin-left: 4px;
  color: var(--muted); font-size: .7rem;
  border-radius: 3px;
  line-height: 1;
  flex-shrink: 0;
  transition: color .15s, background .15s;
}
.epic-toggle-btn:hover { color: var(--dark); background: var(--border); }
.epic-chevron { display: inline-flex; align-items: center; justify-content: center; transition: transform .2s; }
.epic-chevron svg { width: 12px; height: 12px; }
.epic-chevron.open { transform: rotate(180deg); }

/* ── FEATURES LIST ── */
.epic-features {
  display: none;
  padding: 6px 18px 10px 32px;
  background: #F5F5F5;
  border-top: 1px dashed #E6E6E6;
}
.epic-features.expanded { display: block; }
.feature-item {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 3px 0;
  font-size: .73rem;
  color: var(--mid);
  line-height: 1.3;
}
.feature-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}
.feature-dot.st-live      { background: #16a34a; }
.feature-dot.st-released  { background: #22c55e; }
.feature-dot.st-ready-rel { background: #86efac; }
.feature-dot.st-in-dev    { background: #3b82f6; }
.feature-dot.st-ready-dev { background: #60a5fa; }
.feature-dot.st-analysis  { background: #d1d5db; }
.features-loading { padding: 6px; font-size: .7rem; color: var(--muted); font-style: italic; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: opacity .2s, visibility .2s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal-box {
  background: var(--white);
  border-radius: 16px;
  width: 92%; max-width: 700px;
  max-height: 85vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-title {
  font-family: 'Open Sans', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  letter-spacing: -.3px;
}
.modal-close {
  background: none; border: none; cursor: pointer;
  font-size: 1.1rem; color: var(--muted); padding: 4px 8px;
  border-radius: 6px;
  transition: color .15s, background .15s;
}
.modal-close:hover { color: var(--dark); background: var(--border); }
.modal-body {
  overflow-y: auto;
  flex: 1;
}
.modal-section-label {
  font-family: 'Open Sans', sans-serif;
  font-size: .6rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--muted);
  padding: 12px 18px 6px;
  border-bottom: 1px solid #f5f4f0;
}

/* ── HIGHLIGHTS (estilo Aha! claro) ── */
.highlights-wrap {
  background: #fff;
  border: 1px solid #e6e6e6;
  border-radius: 16px;
  padding: 0 0 16px;
  margin-bottom: 0;
  position: relative;
  overflow: hidden;
}
.highlights-top {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 24px 12px;
  border-bottom: 1px solid #e6e6e6;
}
.highlights-title {
  font-family: 'Open Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 4px;
  color: #273240;
}
.highlights-note {
  font-size: .62rem; color: #9c9c9c; font-style: italic;
}
.highlights-scroll {
  display: flex; gap: 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding: 16px 24px 16px;
  scrollbar-width: thin; scrollbar-color: #c5c5c5 transparent;
}
.highlights-scroll::-webkit-scrollbar { height: 3px; }
.highlights-scroll::-webkit-scrollbar-thumb { background: #c5c5c5; border-radius: 2px; }

/* Card de cada Meta */
.hl-meta {
  flex-shrink: 0;
  width: clamp(300px, 30vw, 460px);
  scroll-snap-align: start;
  background: #fff;
  border: 1px solid #e6e6e6;
  border-radius: 12px;
  overflow: hidden;
  display: flex; flex-direction: column;
  max-height: calc(100vh - 160px);
}
.hl-meta.past { opacity: .85; }

/* Footer CTA (ex: review de entregas) */
.hl-meta-footer {
  flex-shrink: 0;
  padding: 10px 12px;
  border-top: 1px solid #d1fae5;
  background: #f0fdf4;
}
.hl-review-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  width: 100%;
  padding: 8px 12px;
  background: #166534;
  color: #fff;
  border-radius: 7px;
  font-family: 'Open Sans', sans-serif;
  font-size: .7rem; font-weight: 700;
  text-decoration: none;
  letter-spacing: .3px;
  transition: background .15s, opacity .15s;
}
.hl-review-btn:hover { background: #14532d; }

/* Cabeçalho do card (destaques) — reutiliza .meta-col-* do módulo 3 */
.hl-meta-head {
  padding: 10px 14px 9px;
  display: flex; align-items: center; gap: 8px; justify-content: center;
  border-bottom: 1px solid #e6e6e6;
  flex-shrink: 0;
  background: #fafaf8;
}
.hl-meta-head.past    { background: #f0fdf4; border-bottom-color: #d1fae5; opacity: 0.75; }
.hl-meta-head.current { background: #fec437; border-bottom-color: #e5b032; }
.hl-meta-head.future  { background: #F5F5F5; border-bottom-color: #E6E6E6; }
.hl-meta-head.current .meta-col-num { color: #273240; }
.hl-meta-head.past .meta-col-num { color: #166534; }
.hl-meta-head.current .meta-col-period,
.hl-meta-head.current .meta-col-dates { color: #5a4e3a; }

.hl-meta-head .meta-pill { margin-left: auto; }

/* Corpo: squads + épicos */
.hl-squads { padding: 0; overflow-y: auto; flex: 1; }

.hl-squad-block {
  border-bottom: 1px solid #f0f0f0;
}
.hl-squad-block:last-child { border-bottom: none; }

.hl-squad-label {
  font-family: 'Open Sans', sans-serif;
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  padding: 8px 14px 4px;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
  transition: background .12s;
  user-select: none;
  color: #273240;
}
.hl-squad-label:hover { background: #f5f5f5; }
.hl-squad-label:active { background: #e6e6e6; }

.hl-squad-arrow {
  margin-left: auto;
  font-size: .6rem;
  opacity: 0;
  transition: opacity .15s;
  color: #999;
}
.hl-squad-label:hover .hl-squad-arrow { opacity: 1; }
.hl-squad-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.hl-epic {
  display: flex; align-items: flex-start; gap: 7px; flex-wrap: wrap;
  padding: 3px 14px 3px 14px;
  border-radius: 4px;
  margin: 0 6px;
  transition: background .1s;
}
.hl-epic:hover { background: #f9f8f5; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; vertical-align: middle; }
.hl-epic .status-dot { margin-top: 5px; }
.hl-name {
  font-size: .76rem; color: #273240; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; flex: 1; min-width: 0;
}
.hl-epic .risk-badge { font-size: .62rem; padding: 2px 7px; margin-left: 18px; margin-bottom: 2px; }
.hl-more-toggle {
  display: flex; align-items: center; gap: 5px;
  width: 100%; background: none; border: none; cursor: pointer;
  font-size: .65rem; color: #aaa; font-style: italic;
  padding: 3px 14px 4px 32px;
  text-align: left;
  font-family: 'Open Sans', sans-serif;
  transition: color .15s;
}
.hl-more-toggle:hover { color: #666; }
.hl-more-toggle.open  { color: #555; font-style: normal; }
.hl-more-chevron {
  font-style: normal; flex-shrink: 0;
  display: inline-block;
  transform: rotate(90deg);
  transition: transform .2s;
}
.hl-more-toggle.open .hl-more-chevron { transform: rotate(-90deg); }
.hl-extra { display: none; }
.hl-extra.visible { display: flex; }

/* ── METAS FUTURAS — botão trigger no header ── */
.hl-parking-btn {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 10px;
  background: #f5f5f5;
  border: 1px solid #c5c5c5;
  border-radius: 20px;
  color: #273240;
  font-family: 'Open Sans', sans-serif;
  font-size: .68rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .2s, border-color .2s, color .2s;
  letter-spacing: .02em;
}
.hl-parking-btn:hover {
  background: #e6e6e6;
  border-color: #c5c5c5;
  color: #273240;
}
.hl-parking-btn.pl-active {
  background: #fef9e7;
  border-color: #fec437;
  color: #273240;
}
.hl-parking-btn-count {
  background: #e6e6e6;
  border-radius: 10px;
  padding: 1px 6px;
  font-size: .63rem;
  font-weight: 600;
  line-height: 1.4;
}
.hl-parking-btn.pl-active .hl-parking-btn-count {
  background: rgba(254,196,55,.25);
}
.hl-parking-btn-arrow {
  font-size: .6rem;
  transition: transform .3s;
}
.hl-parking-btn.pl-active .hl-parking-btn-arrow {
  transform: rotate(180deg);
}

/* ── METAS FUTURAS — side panel deslizante ── */
.hl-parking-panel {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 300px;
  background: #f5f5f5;
  border-left: 1px solid #e6e6e6;
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  z-index: 10;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.hl-parking-panel.pl-open {
  transform: translateX(0);
}
.hl-parking-panel-head {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 14px 10px;
  border-bottom: 1px solid #e6e6e6;
  flex-shrink: 0;
}
.hl-parking-panel-title {
  font-family: 'Open Sans', sans-serif;
  font-size: .72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: #273240;
}
.hl-parking-panel-count {
  font-size: .62rem; color: #9c9c9c; font-style: italic;
}
.hl-parking-panel-close {
  margin-left: auto;
  background: none; border: none;
  color: #9c9c9c; cursor: pointer;
  font-size: 1rem; line-height: 1;
  padding: 3px 5px; border-radius: 4px;
  transition: color .15s, background .15s;
}
.hl-parking-panel-close:hover { color: #273240; background: #e6e6e6; }
.hl-parking-panel-body {
  flex: 1; overflow-y: auto;
  padding: 8px 6px 12px;
  scrollbar-width: thin; scrollbar-color: #c5c5c5 transparent;
}
.hl-parking-panel-body .hl-epic {
  padding: 5px 10px;
  margin: 0 2px;
  border-radius: 5px;
}
.hl-parking-panel-body .hl-epic:hover { background: #e6e6e6; }
.hl-parking-panel-body .hl-name { color: #273240; }

/* Cancelado no parking lot — texto riscado */
.hl-parking-panel-body .pl-cancelled .hl-name {
  text-decoration: line-through;
  opacity: .45;
}
.hl-parking-panel-body .pl-cancelled .status-dot { opacity: .4; }

/* Expandível de internos dentro do painel escuro */
.pl-internal-wrap {
  border-top: 1px solid #e6e6e6;
  margin-top: 6px;
}
.pl-internal-toggle {
  width: 100%;
  padding: 7px 12px;
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  font-family: 'Open Sans', sans-serif;
  font-size: .62rem; font-weight: 600;
  color: #666;
  text-align: left;
  transition: color .15s;
}
.pl-internal-toggle:hover { color: #273240; }
.pl-internal-toggle.open  { color: #273240; }
.pl-internal-toggle .toggle-chevron svg { width: 10px; height: 10px; }
.pl-internal-toggle.open .toggle-chevron { transform: rotate(180deg); }
.pl-internal-panel {
  background: #fafafa;
  border-top: 1px solid #e6e6e6;
}

/* ── MOBILE MATRIX ── */
.mobile-matrix { display: none; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  /* Header compacto */
  header { padding: 10px 16px; gap: 8px; }
  .header-date { display: none; }
  .logo-img { height: 22px; }
  .logo-roadmap { font-size: 11px; }
  .header-btn { padding: 6px 11px; font-size: .73rem; }

  /* Main */
  main { padding: 12px 14px; }

  /* Esconder elementos desktop */
  .timeline-wrap { display: none; }
  .matrix-wrap { display: none; }

  /* Mostrar layout mobile */
  .mobile-matrix { display: block; margin-bottom: 24px; }

  /* Secção de meta */
  .mob-meta-section { margin-bottom: 24px; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .mob-meta-header {
    background: var(--dark); color: #fff;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .mob-meta-header.past    { background: #555; }
  .mob-meta-header.future  { background: #9C9C9C; }
  .mob-meta-num  { font-family: 'Montserrat', sans-serif; font-size: 1.05rem; font-weight: 800; letter-spacing: -.4px; }
  .mob-meta-period { font-size: .73rem; color: #aaa; }
  .mob-meta-header .meta-pill { margin-left: auto; font-size: .6rem; padding: 3px 8px; }
  .mob-meta-dates { font-size: .65rem; color: #888; width: 100%; margin-top: -4px; }

  /* Squad dentro da meta */
  .mob-squad-section { border-top: 2px solid var(--bg); }
  .mob-squad-label {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px;
    border-left: 3px solid;
    font-family: 'Open Sans', sans-serif;
    font-size: .68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px;
    color: var(--dark);
  }
  .mob-epics { border-left: 3px solid; }

  /* Épico compacto */
  .epic-row { padding: 10px 14px; }
  .epic-name { font-size: .82rem; }
  .epic-status { font-size: .63rem; padding: 2px 6px; }
  .progress-bar { display: none; }
  .progress-pct { font-size: .63rem; }
  .risk-badge { font-size: .62rem; padding: 2px 6px; }
  .epic-toggle-btn { font-size: .65rem; }

  /* Features */
  .epic-features { padding: 4px 12px 8px 24px; }
  .feature-item { font-size: .7rem; }

  /* Expandível internos (mobile) */
  .btn-internal-toggle { font-size: .63rem; padding: 6px 12px; }

  /* Modal */
  .modal-box { width: 97%; max-height: 92vh; border-radius: 12px; }
  .modal-header { padding: 12px 16px; }
  .modal-title { font-size: .85rem; }
}
</style>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────
const SITE_PASSWORD_HASH = 'c2699a769aba98702871029843836cabadcf19b9675f5fa00cefe19f8fa69b1a'; // SHA-256
const WORKER_URL        = 'https://lucky-star-d742.ana-g-antunes.workers.dev';

const AUTO_REFRESH_MS   = 24 * 60 * 60 * 1000;  // 24 horas

// ─── AUTO-REFRESH ──────────────────────────────────────────────────
let _autoRefreshTimer = null;

function updateRefreshInfo() {
  const el = document.getElementById('headerRefreshInfo');
  if (!el) return;
  const next = new Date(Date.now() + AUTO_REFRESH_MS);
  el.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M21.5 2v6h-6"/><path d="M2.5 22v-6h6"/><path d="M2.5 11.5a10 10 0 0 1 18.4-4.5"/><path d="M21.5 12.5a10 10 0 0 1-18.4 4.5"/></svg>próximo refresh às ${next.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })}`;
}

function startAutoRefresh() {
  stopAutoRefresh();
  updateRefreshInfo();
  _autoRefreshTimer = setInterval(() => {
    loadData();
    updateRefreshInfo();
  }, AUTO_REFRESH_MS);
}

function stopAutoRefresh() {
  if (_autoRefreshTimer) { clearInterval(_autoRefreshTimer); _autoRefreshTimer = null; }

// ─── AUTH ──────────────────────────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const input = document.getElementById('loginInput').value;
  const hash  = await sha256(input);
  if (hash === SITE_PASSWORD_HASH) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    const now = new Date();
    document.getElementById('headerDate').textContent =
      now.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    loadData();
    startAutoRefresh();
  } else {
    document.getElementById('loginError').classList.add('show');
  }
}
document.getElementById('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  stopAutoRefresh();
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginInput').value = '';
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ─── API ───────────────────────────────────────────────────────────
async function ahaGet(path) {
  const res = await fetch(`${WORKER_URL}?path=${encodeURIComponent(path)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ─── LOAD DATA (pivot único → tudo de uma vez) ─────────────────────
async function loadData() {
  showLoading();
  try {
    // 1. Uma única chamada — pivot devolve releases + épicos + estado + progresso + risco
    const pivotData = await ahaGet(`bookmarks/custom_pivots/${getPivotId()}`);
    const rows    = pivotData.rows  || {};
    const cells   = pivotData.cells || {};
    const topRows = pivotData.top_level_rows || [];

    // Resolver field refs dinamicamente a partir de field_definitions (resistente a rebuilds da pivot)
    const _fdDefs = pivotData.field_definitions || {};
    const _fdByKey = {};
    Object.values(_fdDefs).forEach(d => {
      _fdByKey[`${d.table}.${d.field}`] = d.ref;
      if (d.title) _fdByKey[`title.${d.title.toLowerCase()}`] = d.ref;
    });
    const FD = {
      epicName:       _fdByKey['epics.name'],
      epicProgress:   _fdByKey['epics.progress'],
      epicStatus:     _fdByKey['epics.status'],
      epicRisk:       _fdByKey['epics.manual_risk_comment'],
      epicPrio:       _fdByKey['title.prio produto'],
      epicVisibility: _fdByKey['title.epic visibility'],
    };

    const allEpicsGrid = cells['0'] || [];

    const allMetas = topRows.map((rowRef, idx) => {
      const nameRow  = rows[rowRef] || {};
      const startRef = nameRow.child_refs?.[0];
      const startRow = startRef ? (rows[startRef] || {}) : {};
      const endRef   = startRow.child_refs?.[0];
      const endRow   = endRef   ? (rows[endRef]   || {}) : {};
      const plRef    = endRow.child_refs?.[0];
      const plRow    = plRef    ? (rows[plRef]    || {}) : {};

      const isParking = (plRow.plain_value || '').toLowerCase() === 'yes';
      const releaseRefMatch = (nameRow.html_value || '').match(/\/releases\/([\w-]+)/);

      // Épicos: cells["0"][idx] → array de épicos; deduplicar por ID
      const epicGroups = allEpicsGrid[idx] || [];
      const seenIds = new Set();
      const epics = epicGroups.map(fieldVals => {
        const byFd = {};
        for (const fv of fieldVals) byFd[fv.field_definition_ref] = fv;

        const nameField  = byFd[FD.epicName];
        const epicId     = nameField?.id || null;
        if (!epicId || seenIds.has(epicId)) return null;
        seenIds.add(epicId);

        const epicName   = nameField?.plain_value || '';
        const epicRef    = (nameField?.html_value || '').match(/\/epics\/([\w-]+)/)?.[1] || null;
        const prioRaw    = byFd[FD.epicPrio]?.plain_value;
        const progress   = byFd[FD.epicProgress]?.plain_value ?? null;
        const riskVal    = byFd[FD.epicRisk]?.plain_value || null;
        const statusName = byFd[FD.epicStatus]?.rich_value?.name || byFd[FD.epicStatus]?.plain_value || null;
        const visRaw     = byFd[FD.epicVisibility]?.plain_value || '';

        return {
          name: epicName,
          _epicRef: epicRef,
          _releaseRef: releaseRefMatch?.[1] || null,
          _priority: (prioRaw != null && prioRaw !== '') ? Number(prioRaw) : null,
          progress: progress != null ? Math.round(Number(progress)) : null,
          workflow_status: statusName ? { name: statusName } : null,
          _alert: riskVal,
          _visibility: visRaw.toLowerCase(), // 'highlight' | 'internal' | ''
        };
      }).filter(e => e && e.name);

      return {
        name: nameRow.plain_value || '',
        id: releaseRefMatch?.[1] || String(rowRef),
        _releaseRef: releaseRefMatch?.[1],
        isParking,
        epics,
        _start: parseDate(startRow.plain_value),
        _end:   parseDate(endRow.plain_value),
      };
    });

    // 2a. Separar parking lot das metas normais (pivot inclui "Meta Futura" como parking_lot=Yes)
    const parkingLotEpics = allMetas
      .filter(m => m.isParking)
      .flatMap(m => m.epics)
      .sort((a, b) => (a._priority ?? Infinity) - (b._priority ?? Infinity));

    const metas = allMetas.filter(m => !m.isParking && m._releaseRef);

    // 2. Agrupar por meta e classificar
    const allGroups = groupMetasByNumber(metas);
    const today = new Date(); today.setHours(0,0,0,0);
    const past = [], current = [], future = [];
    for (const group of allGroups) {
      const s = group._start || new Date(0);
      const e = group._end   || new Date(9999,0);
      if (e < today)       past.push(group);
      else if (s <= today) current.push(group);
      else                 future.push(group);
    }

    renderAll({ past, current, future, parkingLotEpics });
  } catch(err) {
    showError('Erro ao carregar dados: ' + err.message);
  }
}

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}


// ─── STATUS CLASSIFICATION ─────────────────────────────────────────
// Ordem do workflow Aha! do menos avançado (backlog) ao mais avançado (live).
// group: menor = mais avançado = aparece primeiro na ordenação.
const STATUS_CONFIG = [
  { keys: ['live'],                                          group: 0, cls: 'st-live',      color: '#16a34a' },
  { keys: ['released', 'lançado', 'lançada'],                group: 1, cls: 'st-released',  color: '#22c55e' },
  { keys: ['pronto para release', 'ready for release'],      group: 2, cls: 'st-ready-rel', color: '#86efac' },
  { keys: ['em desenvolvimento', 'in development'],          group: 3, cls: 'st-in-dev',    color: '#3b82f6' },
  { keys: ['pronto para desenvolvimento', 'ready for development'],
                                                             group: 4, cls: 'st-ready-dev', color: '#60a5fa' },
  { keys: ['em especificação final'],                        group: 5, cls: 'st-analysis',  color: '#9ca3af' },
  { keys: ['em aprovação de escopo'],                        group: 6, cls: 'st-analysis',  color: '#9ca3af' },
  { keys: ['em escopo geral'],                               group: 7, cls: 'st-analysis',  color: '#d1d5db' },
  { keys: ['backlog de features', 'backlog'],                group: 8, cls: 'st-analysis',  color: '#d1d5db' },
  { keys: ['cancelada', 'cancelled', 'cancelado'],           group: 9, cls: 'st-cancelled', color: '#ef4444' },
];

function getStatusInfo(statusName) {
  const key = (statusName || '').toLowerCase().trim();
  for (const cfg of STATUS_CONFIG) {
    if (cfg.keys.some(k => key === k || key.includes(k))) return cfg;
  }
  // Default: desconhecido → fim da lista
  return { group: 9, cls: 'st-analysis', color: '#d1d5db' };
}

// ─── DELIVERY RISK ─────────────────────────────────────────────────
function getRisk(epic) {
  // Check alert from pivot (primary source)
  if (epic._alert) {
    const a = epic._alert.toLowerCase();
    if (a.includes('urgente') || a.includes('urgent'))             return 'urgent';
    if (a.includes('não planeado') || a.includes('nao planeado')) return 'unplanned';
    if (a.includes('risco'))                                       return 'atrisk';
    if (a.includes('longa') || a.includes('long'))                 return 'long';
  }
  // Fallback: native delivery risk field
  if (epic.due_date_risk) {
    const r = epic.due_date_risk.toLowerCase();
    if (r.includes('urgente') || r.includes('urgent'))         return 'urgent';
    if (r.includes('unplanned') || r.includes('não planeado')) return 'unplanned';
    if (r.includes('risk') || r.includes('risco'))             return 'atrisk';
    if (r.includes('long') || r.includes('longa'))             return 'long';
  }
  return null;
}

function riskBadge(risk) {
  if (!risk) return '';
  const map = {
    urgent:    ['‼ Urgente',       'risk-urgent'],
    unplanned: ['⚠ Não planeado', 'risk-unplanned'],
    atrisk:    ['⚡ Em risco',     'risk-atrisk'],
    long:      ['⏳ Entrega longa','risk-long'],
  };
  const [label, cls] = map[risk];
  return `<span class="risk-badge ${cls}">${label}</span>`;
}

// ─── GROUP METAS BY NUMBER ─────────────────────────────────────────
const META_PERIODS = ['Jan/Fev', 'Mar/Abr', 'Mai/Jun', 'Jul/Ago', 'Set/Out', 'Nov/Dez'];

function groupMetasByNumber(metas) {
  const groups = {};
  for (const m of metas) {
    const match = m.name.match(/Meta\s+(\d+)\s+(\d{4})/i);
    if (!match) continue;
    const metaNum = parseInt(match[1]);
    const year    = parseInt(match[2]);
    const key     = `${year}-${String(metaNum).padStart(2,'0')}`;
    if (!groups[key]) {
      groups[key] = {
        metaNum, year, key,
        period: META_PERIODS[metaNum - 1] || '',
        squads: [], _start: null, _end: null
      };
    }
    const squadName = m.name.replace(/^Meta\s+\d+\s+\d{4}\s*[-–]\s*/i, '').trim() || m.name;
    groups[key].squads.push({ name: squadName, epics: m.epics });
    if (m._start && (!groups[key]._start || m._start < groups[key]._start)) groups[key]._start = m._start;
    if (m._end   && (!groups[key]._end   || m._end   > groups[key]._end))   groups[key]._end   = m._end;
  }
  return Object.values(groups).sort((a, b) =>
    a.year !== b.year ? a.year - b.year : a.metaNum - b.metaNum
  );
}

// ─── TIMELINE ──────────────────────────────────────────────────────
function renderTimeline({ past, current, future }) {
  const allGroups = [
    ...past.map(g => ({...g, type:'past'})),
    ...current.map(g => ({...g, type:'current'})),
    ...future.map(g => ({...g, type:'future'}))
  ].sort((a,b) => a.year !== b.year ? a.year - b.year : a.metaNum - b.metaNum);

  if (!allGroups.length) return '';

  // Find the year range from the data
  const year = allGroups[0].year || 2026;
  const yearStart = new Date(year, 0, 1);
  const yearEnd   = new Date(year, 11, 31);
  const totalMs   = yearEnd - yearStart;
  const pct = d => d ? Math.max(0, Math.min(100, ((d - yearStart) / totalMs) * 100)) : null;

  const today    = new Date();
  const todayPct = pct(today);
  const months   = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  // Month separator lines (reused in each row)
  const sepLines = months.map((_, i) => {
    const p = (i / 12 * 100).toFixed(2);
    return `<div class="timeline-month-sep" style="left:${p}%"></div>`;
  }).join('');

  // Month labels row
  const monthLabels = months.map((m, i) => {
    const p = ((i + 0.5) / 12 * 100).toFixed(2);
    return `<div class="timeline-month-label" style="left:${p}%">${m}</div>`;
  }).join('');

  // Today marker in month labels row
  const todayMarker = todayPct !== null
    ? `<div class="timeline-today-label" style="left:${todayPct.toFixed(2)}%">Hoje</div>`
    : '';

  // Linha única — cada meta ocupa 2 meses fixos (independente das datas reais do Aha!)
  const MONTHS_PER_META = 2;
  const bars = allGroups.map(group => {
    const startMonth = (group.metaNum - 1) * MONTHS_PER_META;
    const left  = (startMonth / 12 * 100).toFixed(2);
    const width = (MONTHS_PER_META / 12 * 100).toFixed(2);
    const period = group.period ? ` · ${group.period}` : '';
    return `<div class="timeline-bar ${group.type}" style="left:calc(${left}% + 2.5px);width:calc(${width}% - 5px)"
              onclick="document.getElementById('meta-${group.year}-${group.metaNum}')?.scrollIntoView({behavior:'smooth',block:'start'})"
              title="Meta ${group.metaNum}${period}">
              Meta ${group.metaNum}${period}
            </div>`;
  }).join('');

  const todayLine = todayPct !== null
    ? `<div class="timeline-today-line" style="left:${todayPct.toFixed(2)}%"></div>`
    : '';

  return `
    <div class="timeline-strip">
      <div class="timeline-strip-months">${monthLabels}${todayMarker}</div>
      <div class="timeline-strip-rows">
        <div class="timeline-row">
          ${sepLines}${bars}${todayLine}
        </div>
      </div>
    </div>`;
}

// ─── SQUAD CONFIG ──────────────────────────────────────────────────
const SQUAD_ORDER = [
  'Beehive', 'BeeHive UI', 'Bee2Bee/BeeChannel',
  'BeeConnect/Partners API', 'Visão 360', 'BeePrice', 'BeeDirect'
];

// cor (borda + dot), bg suave, linhas do label
const SQUAD_STYLE = {
  'Beehive':                 { color: '#F59E0B', bg: '#fffbeb', lines: ['Beehive'],               team: '5 Dev · 2 QA' },
  'BeeHive UI':              { color: '#FCD34D', bg: '#fefce8', lines: ['BeeHive UI'],             team: '6 Dev · 1 QA' },
  'Bee2Bee/BeeChannel':      { color: '#3B82F6', bg: '#eff6ff', lines: ['Bee2Bee', 'BeeChannel'], team: '3 Dev' },
  'BeeConnect/Partners API': { color: '#22C55E', bg: '#f0fdf4', lines: ['BeeConnect', 'Partners API'], team: '4 Dev' },
  'Visão 360':               { color: '#06B6D4', bg: '#ecfeff', lines: ['Visão 360'],              team: '3 Dev · 1 QA' },
  'BeePrice':                { color: '#F472B6', bg: '#fdf4ff', lines: ['BeePrice'],               team: '3 Dev' },
  'BeeDirect':               { color: '#A78BFA', bg: '#faf5ff', lines: ['BeeDirect'],              team: '4 Dev · 2 QA' },
};

// Partial-match aliases: if data has only one part of a combined squad name, map it
const SQUAD_ALIASES = {
  'bee2bee':        'Bee2Bee/BeeChannel',
  'beechannel':     'Bee2Bee/BeeChannel',
  'beeconnect':     'BeeConnect/Partners API',
  'partnersapi':    'BeeConnect/Partners API',
};

function normalizeSquad(name) {
  const n = name.toLowerCase().replace(/[\s\/\-_]/g, '');
  // Exact match first
  const exact = SQUAD_ORDER.find(s => s.toLowerCase().replace(/[\s\/\-_]/g, '') === n);
  if (exact) return exact;
  // Alias match
  const alias = SQUAD_ALIASES[n];
  if (alias) return alias;
  // Partial match: if the normalized name is fully contained in a squad order entry's normalized name
  const partial = SQUAD_ORDER.find(s => s.toLowerCase().replace(/[\s\/\-_]/g, '').includes(n));
  if (partial) return partial;
  return null; // Return null for unknown squads so we can filter them out
}

function isKnownSquad(name) {
  return normalizeSquad(name) !== null;
}

// ─── RENDER ────────────────────────────────────────────────────────
function renderAll({ past, current, future, parkingLotEpics = [] }) {
  const allGroups = [
    ...past.map(g => ({...g, type:'past'})),
    ...current.map(g => ({...g, type:'current'})),
    ...future.map(g => ({...g, type:'future'}))
  ].sort((a,b) => a.year !== b.year ? a.year - b.year : a.metaNum - b.metaNum);

  // Collect all unique squad names (normalized), in preferred order
  // Only include squads that are in SQUAD_ORDER (unknown/extra squads are hidden)
  const squadSet = new Set();
  allGroups.forEach(g => g.squads.forEach(s => {
    const norm = normalizeSquad(s.name);
    if (norm) squadSet.add(norm);
  }));
  const squads = SQUAD_ORDER.filter(s => squadSet.has(s));

  // Build lookup: metaKey → normalizedSquad → {epics, type}
  // If multiple raw squads normalize to same name, merge their epics
  const lookup = {};
  allGroups.forEach(g => {
    const key = `${g.year}-${g.metaNum}`;
    if (!lookup[key]) lookup[key] = {};
    g.squads.forEach(s => {
      const norm = normalizeSquad(s.name);
      if (!norm) return; // skip unknown squads
      if (!lookup[key][norm]) {
        lookup[key][norm] = { epics: [], type: g.type };
      }
      lookup[key][norm].epics.push(...s.epics);
    });
  });

  const html = renderTimeline({ past, current, future })
    + renderHighlights(allGroups, squads, lookup, parkingLotEpics)
    + `<div class="detail-section-divider"><span class="detail-section-title">Detalhe das Metas</span></div>`
    + renderMatrix(allGroups, squads, lookup)
    + renderMobileMatrix(allGroups, squads, lookup);
  document.getElementById('content').innerHTML = html;
}

function renderMatrix(metas, squads, lookup) {
  const numMetas = metas.length;
  const cols = `180px repeat(${numMetas}, 420px)`;

  const pillMap = {
    past:    ['pill-past',    '✓ Concluída'],
    current: ['pill-current', 'Em curso'],
    future:  ['pill-next',    'A seguir'],
  };

  // Header row
  const headerCells = metas.map(g => {
    const [pillClass, pillLabel] = pillMap[g.type];
    const dates = formatDateRange(g._start, g._end);
    return `
      <div class="matrix-col-header ${g.type}" id="meta-${g.year}-${g.metaNum}">
        <span class="meta-col-num">Meta ${g.metaNum}</span>
        <span class="meta-col-period">${g.period} ${g.year}</span>
        <span class="meta-col-dates">${dates}</span>
        <span class="meta-pill ${pillClass}">${pillLabel}</span>
      </div>`;
  }).join('');

  if (!window.__cellStore) window.__cellStore = {};

  // Data rows
  const dataRows = squads.map(squad => {
    const cells = metas.map(g => {
      const key = `${g.year}-${g.metaNum}`;
      const entry = lookup[key]?.[squad];
      const epics = entry?.epics || [];
      const type  = entry?.type || g.type;
      const sorted = [...epics].sort((a, b) => {
        const pa = a._priority != null ? a._priority : Infinity;
        const pb = b._priority != null ? b._priority : Infinity;
        if (pa !== pb) return pa - pb;
        return getStatusInfo(a.workflow_status?.name).group - getStatusInfo(b.workflow_status?.name).group;
      });

      if (!sorted.length) return `<div class="matrix-cell cell-${type}"><div class="matrix-cell-empty">—</div></div>`;

      const cellKey = `${g.year}_${g.metaNum}_${squad.replace(/[^\w]/g,'_')}`;
      window.__cellStore[cellKey] = { label: `Meta ${g.metaNum} · ${g.period} · ${squad}`, epics: sorted };

      const visible  = sorted.filter(e => e._visibility !== 'internal');
      const internal = sorted.filter(e => e._visibility === 'internal');

      const epicHtml = visible.map(e => renderEpicRow(e, type)).join('');
      const internalSection = internal.length > 0 ? `
        <div class="internal-expand-wrap">
          <button class="btn-internal-toggle" onclick="toggleInternalEpics(this)" data-count="${internal.length}">
            <span class="toggle-chevron"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg></span>
            <span class="toggle-text">Ver detalhes internos (${internal.length})</span>
          </button>
          <div class="internal-epics-panel">
            ${internal.map(e => renderEpicRow(e, type)).join('')}
          </div>
        </div>` : '';

      return `<div class="matrix-cell cell-${type}" id="cell-${cellKey}">${epicHtml}${internalSection}</div>`;
    }).join('');

    const sc = SQUAD_STYLE[squad] || { color: '#888', bg: '#fff', lines: [squad] };
    const nameHtml = sc.lines.length > 1
      ? `<span class="squad-name-main">${sc.lines[0]}</span><span class="squad-name-sub">${sc.lines[1]}</span>`
      : `<span class="squad-name">${sc.lines[0]}</span>`;
    const teamHtml = sc.team ? `<span class="squad-team-info">${sc.team}</span>` : '';

    return `
      <div class="matrix-squad-label" style="border-left-color:${sc.color}; background:${sc.bg || 'var(--white)'};">
        <div class="squad-name-wrap">${nameHtml}${teamHtml}</div>
      </div>
      ${cells}`;
  }).join('');

  return `
    <div class="matrix-wrap">
      <div class="matrix-grid" style="grid-template-columns:${cols}">
        <div class="matrix-squad-header"></div>
        ${headerCells}
        ${dataRows}
      </div>
    </div>`;
}

// ─── HIGHLIGHTS ─────────────────────────────────────────────────────
// Critério de selecção para destaques: campo "Epic Visibility" = "Highlight" no Aha!
function isHighlighted(epic) {
  return epic._visibility === 'highlight';
}

// Máximo de épicos mostrados por squad no painel de destaques.
// Aumenta este valor se quiseres ver mais épicos por squad.
const HIGHLIGHTS_MAX_PER_SQUAD = 4;

function renderHighlights(metas, squads, lookup, parkingLotEpics = []) {
  const pillMap = {
    past:    ['pill-past',    '✓ Concluída'],
    current: ['pill-current', 'Em curso'],
    future:  ['pill-next',    'A seguir'],
  };

  const cards = metas.map(g => {
    const [pillClass, pillLabel] = pillMap[g.type];
    let anyEpic = false;

    const squadBlocks = squads.map(squad => {
      const key   = `${g.year}-${g.metaNum}`;
      const entry = lookup[key]?.[squad];
      if (!entry?.epics?.length) return '';

      const allHlEpics = entry.epics
        .filter(e => isHighlighted(e))
        .sort((a, b) => {
          const pa = a._priority != null ? a._priority : Infinity;
          const pb = b._priority != null ? b._priority : Infinity;
          if (pa !== pb) return pa - pb;
          return getStatusInfo(a.workflow_status?.name).group - getStatusInfo(b.workflow_status?.name).group;
        });

      if (!allHlEpics.length) return '';
      anyEpic = true;

      const remaining = Math.max(0, allHlEpics.length - HIGHLIGHTS_MAX_PER_SQUAD);

      const sc = SQUAD_STYLE[squad] || { color: '#aaa', lines: [squad] };

      const renderHlEpic = (e, hidden = false) => {
        const si   = getStatusInfo(e.workflow_status?.name);
        const risk = getRisk(e);
        return `<div class="hl-epic${hidden ? ' hl-extra' : ''}">
          <span class="status-dot" style="background:${si.color}" title="${e.workflow_status?.name || ''}"></span>
          <span class="hl-name">${e.name}</span>
          ${risk ? riskBadge(risk) : ''}
        </div>`;
      };

      const allEpicsHtml = allHlEpics.map((e, i) => renderHlEpic(e, i >= HIGHLIGHTS_MAX_PER_SQUAD)).join('');

      const moreBtn = remaining > 0 ? `
        <button class="hl-more-toggle" onclick="toggleHlMore(this)" data-count="${remaining}">
          <span class="hl-more-chevron">›</span>+${remaining} épico${remaining > 1 ? 's' : ''}
        </button>` : '';

      const epicsHtml = allEpicsHtml + moreBtn;

      const hlCellKey = `${g.year}_${g.metaNum}_${squad.replace(/[^\w]/g,'_')}`;
      return `
        <div class="hl-squad-block">
          <div class="hl-squad-label" onclick="scrollToMatrix('${hlCellKey}')" title="Ver detalhes de Meta ${g.metaNum} · ${sc.lines.join(' / ')}">
            <span>${sc.lines.join(' / ')}</span>
            <span class="hl-squad-arrow">↓</span>
          </div>
          ${epicsHtml}
        </div>`;
    }).join('');

    if (!anyEpic) return '';

    const reviewCta = (g.metaNum === 1 && g.type === 'past')
      ? `<div class="hl-meta-footer">
           <a class="hl-review-btn"
              href="https://aha-conector.vercel.app/public/snapshots/98605584-d0c8-429e-921c-dcb8aabb7337"
              target="_blank" rel="noopener noreferrer">
             Ver relatório de fecho de meta ↗
           </a>
         </div>`
      : '';

    const dates = formatDateRange(g._start, g._end);
    return `
      <div class="hl-meta ${g.type}">
        <div class="hl-meta-head ${g.type}">
          <span class="meta-col-num">Meta ${g.metaNum}</span>
          <span class="meta-col-period">${g.period} ${g.year}</span>
          <span class="meta-col-dates">${dates}</span>
          <span class="meta-pill ${pillClass}">${pillLabel}</span>
        </div>
        <div class="hl-squads">${squadBlocks}</div>
        ${reviewCta}
      </div>`;
  }).join('');

  // ── Side panel "Metas futuras" (parking lot) ────────────────────
  let parkingBtn = '';
  let parkingPanel = '';
  if (parkingLotEpics.length > 0) {
    const plVisible  = parkingLotEpics.filter(e => e._visibility !== 'internal');
    const plInternal = parkingLotEpics.filter(e => e._visibility === 'internal');
    const count = plVisible.length;

    const renderPlEpic = e => {
      const si        = getStatusInfo(e.workflow_status?.name);
      const risk      = getRisk(e);
      const cancelled = si.group === 9;
      return `<div class="hl-epic${cancelled ? ' pl-cancelled' : ''}">
        <span class="status-dot" style="background:${si.color}" title="${e.workflow_status?.name || ''}"></span>
        <span class="hl-name">${e.name}</span>
        ${risk ? riskBadge(risk) : ''}
      </div>`;
    };

    const visibleHtml  = plVisible.map(renderPlEpic).join('');
    const internalSection = plInternal.length > 0 ? `
      <div class="pl-internal-wrap">
        <button class="pl-internal-toggle" onclick="toggleInternalEpics(this)" data-count="${plInternal.length}" data-label="Ver detalhes internos (${plInternal.length})">
          <span class="toggle-chevron"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg></span>
          <span class="toggle-text">Ver detalhes internos (${plInternal.length})</span>
        </button>
        <div class="internal-epics-panel pl-internal-panel">
          ${plInternal.map(renderPlEpic).join('')}
        </div>
      </div>` : '';

    parkingBtn = `
      <button class="hl-parking-btn" id="hlParkingBtn" onclick="toggleParkingPanel()" title="Mostrar / ocultar Metas futuras">
        Metas futuras
        <span class="hl-parking-btn-count">${count}</span>
        <span class="hl-parking-btn-arrow">›</span>
      </button>`;

    parkingPanel = `
      <div class="hl-parking-panel" id="hlParkingPanel">
        <div class="hl-parking-panel-head">
          <span class="hl-parking-panel-title">Metas futuras</span>
          <span class="hl-parking-panel-count">${count} épico${count !== 1 ? 's' : ''}</span>
          <button class="hl-parking-panel-close" onclick="toggleParkingPanel()" title="Fechar">✕</button>
        </div>
        <div class="hl-parking-panel-body">${visibleHtml}${internalSection}</div>
      </div>`;
  }

  if (!cards.trim() && !parkingPanel) return '';

  return `
    <div class="highlights-wrap">
      <div class="highlights-top">
        <span class="highlights-title">Destaques · ${metas[0]?.year || ''}</span>
        <span class="highlights-note">Foco principal de cada squad · ordenados por prioridade</span>
        ${parkingBtn}
      </div>
      <div class="highlights-scroll">${cards}</div>
      ${parkingPanel}
    </div>`;
}

// ─── MOBILE MATRIX (layout vertical: metas → squads → épicos) ──────
function renderMobileMatrix(metas, squads, lookup) {
  const pillMap = {
    past:    ['pill-past',    '✓ Concluída'],
    current: ['pill-current', 'Em curso'],
    future:  ['pill-next',    'A seguir'],
  };

  const sections = metas.map(g => {
    const [pillClass, pillLabel] = pillMap[g.type];
    const dates = formatDateRange(g._start, g._end);

    const squadSections = squads.map(squad => {
      const key  = `${g.year}-${g.metaNum}`;
      const entry = lookup[key]?.[squad];
      if (!entry?.epics?.length) return '';

      const type   = entry.type || g.type;
      const sorted = [...entry.epics].sort((a, b) => {
        const pa = a._priority != null ? a._priority : Infinity;
        const pb = b._priority != null ? b._priority : Infinity;
        if (pa !== pb) return pa - pb;
        return getStatusInfo(a.workflow_status?.name).group - getStatusInfo(b.workflow_status?.name).group;
      });

      const cellKey = `${g.year}_${g.metaNum}_${squad.replace(/[^\w]/g,'_')}`;
      window.__cellStore[cellKey] = { label: `Meta ${g.metaNum} · ${g.period} · ${squad}`, epics: sorted };

      const visible  = sorted.filter(e => e._visibility !== 'internal');
      const internal = sorted.filter(e => e._visibility === 'internal');
      const sc = SQUAD_STYLE[squad] || { color: '#888', bg: '#fff', lines: [squad] };
      const squadLabel = sc.lines.join(' / ');

      const epicHtml = visible.map(e => renderEpicRow(e, type)).join('');
      const internalSection = internal.length > 0 ? `
        <div class="internal-expand-wrap">
          <button class="btn-internal-toggle" onclick="toggleInternalEpics(this)" data-count="${internal.length}">
            <span class="toggle-chevron"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg></span>
            <span class="toggle-text">Ver detalhes internos (${internal.length})</span>
          </button>
          <div class="internal-epics-panel">
            ${internal.map(e => renderEpicRow(e, type)).join('')}
          </div>
        </div>` : '';

      return `
        <div class="mob-squad-section">
          <div class="mob-squad-label" style="border-left-color:${sc.color}; background:${sc.bg}">
            ${squadLabel}
          </div>
          <div class="mob-epics" style="border-left-color:${sc.color}; background:${sc.bg}">
            ${epicHtml}${internalSection}
          </div>
        </div>`;
    }).join('');

    if (!squadSections.trim()) return '';

    return `
      <div class="mob-meta-section">
        <div class="mob-meta-header ${g.type}">
          <span class="mob-meta-num">Meta ${g.metaNum}</span>
          <span class="mob-meta-period">${g.period} ${g.year}</span>
          <span class="meta-pill ${pillClass}">${pillLabel}</span>
          ${dates ? `<span class="mob-meta-dates">${dates}</span>` : ''}
        </div>
        ${squadSections}
      </div>`;
  }).join('');

  return `<div class="mobile-matrix">${sections}</div>`;
}

function renderEpicRow(epic, type) {
  const status   = epic.workflow_status?.name || '—';
  const progress = epic.progress != null ? Math.round(epic.progress) : null;
  const risk     = getRisk(epic);
  const stInfo   = getStatusInfo(status);
  const toggleBtn = epic._epicRef
    ? `<button class="epic-toggle-btn" title="Ver features" onclick="toggleFeatures(this,'${epic._epicRef}','${epic._releaseRef||''}')"><span class="epic-chevron"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg></span></button>`
    : '';

  return `
    <div class="epic-row ${stInfo.cls}">
      <div class="epic-top">
        <span class="epic-name">${epic.name}</span>
        ${riskBadge(risk)}
        ${toggleBtn}
      </div>
      <div class="epic-bottom">
        <span class="epic-status"><span class="status-dot" style="background:${stInfo.color}"></span> ${status}</span>
        ${progress !== null ? `
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
          <span class="progress-pct">${progress}%</span>
        ` : ''}
      </div>
    </div>`;
}

// ─── TOGGLE "+N épicos" NOS DESTAQUES ─────────────────────────────
function toggleHlMore(btn) {
  const block  = btn.closest('.hl-squad-block');
  const extras = block.querySelectorAll('.hl-extra');
  const isOpen = btn.classList.toggle('open');
  extras.forEach(el => el.classList.toggle('visible', isOpen));
  const count = btn.dataset.count || '';
  btn.innerHTML = isOpen
    ? `<span class="hl-more-chevron">›</span>ver apenas top 4`
    : `<span class="hl-more-chevron">›</span>+${count} épico${count > 1 ? 's' : ''}`;
}

// ─── TOGGLE ÉPICOS INTERNOS (expandível dentro de cada célula ou painel) ─────
function toggleInternalEpics(btn) {
  const wrap  = btn.closest('.internal-expand-wrap, .pl-internal-wrap');
  if (!wrap) return;
  const panel = wrap.querySelector('.internal-epics-panel');
  const isOpen = panel.classList.toggle('expanded');
  btn.classList.toggle('open', isOpen);
  const count     = btn.dataset.count;
  const closedTxt = btn.dataset.label || `Ver detalhes internos (${count})`;
  btn.querySelector('.toggle-text').textContent =
    isOpen ? 'Ocultar detalhes internos' : closedTxt;
}

// ─── PIVOT SETTINGS POPOVER ────────────────────────────────────────
function togglePivotSettings() {
  const pop = document.getElementById('pivotPopover');
  const isOpen = pop.classList.toggle('open');
  if (isOpen) {
    const inp = document.getElementById('pivotIdInput');
    inp.value = getPivotId();
    document.getElementById('pivotPopoverHint').textContent =
      getPivotId() === PIVOT_ID_DEFAULT ? 'A usar o ID padrão.' : 'ID personalizado ativo.';
    inp.focus(); inp.select();
  }
}
function savePivotId() {
  const val = document.getElementById('pivotIdInput').value.trim();
  if (!val) return;
  localStorage.setItem('roadmap_pivot_id', val);
  document.getElementById('pivotPopover').classList.remove('open');
  loadData();
}
function resetPivotId() {
  localStorage.removeItem('roadmap_pivot_id');
  document.getElementById('pivotIdInput').value = PIVOT_ID_DEFAULT;
  document.getElementById('pivotPopoverHint').textContent = 'ID restaurado para o padrão.';
}
// Fechar popover ao clicar fora
document.addEventListener('click', e => {
  const wrap = e.target.closest('.pivot-settings-wrap');
  if (!wrap) document.getElementById('pivotPopover')?.classList.remove('open');
});

// ─── TOGGLE PARKING LOT PANEL ──────────────────────────────────────
function toggleParkingPanel() {
  const panel = document.getElementById('hlParkingPanel');
  const btn   = document.getElementById('hlParkingBtn');
  if (!panel) return;
  const isOpen = panel.classList.toggle('pl-open');
  if (btn) btn.classList.toggle('pl-active', isOpen);
}

// ─── SCROLL TO MATRIX CELL ─────────────────────────────────────────
function scrollToMatrix(cellKey) {
  const cell = document.getElementById('cell-' + cellKey);
  if (!cell) return;

  // scrollIntoView handles vertical (window) + horizontal (matrix-wrap) simultaneously
  cell.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });

  // Flash highlight after scroll settles
  setTimeout(() => {
    cell.classList.remove('cell-highlight'); // reset if re-triggered
    void cell.offsetWidth;                   // force reflow to restart CSS animation
    cell.classList.add('cell-highlight');
    setTimeout(() => cell.classList.remove('cell-highlight'), 1700);
  }, 700);
}

// ─── MODAL ─────────────────────────────────────────────────────────
function openDetails(cellKey) {
  const data = window.__cellStore?.[cellKey];
  if (!data) return;
  document.getElementById('modalTitle').textContent = data.label;
  const grouped = {
    visible:  data.epics.filter(e => e._visibility !== 'internal'),
    internal: data.epics.filter(e => e._visibility === 'internal'),
  };
  let html = grouped.visible.map(e => renderEpicRow(e, 'modal')).join('');
  if (grouped.internal.length) {
    html += `<div class="modal-section-label">Épicos internos</div>`;
    html += grouped.internal.map(e => renderEpicRow(e, 'modal')).join('');
  }
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('detailsModal').classList.add('open');
}

function closeModal() {
  document.getElementById('detailsModal').classList.remove('open');
}

// Fechar modal com Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── FEATURES (expandível por épico) ───────────────────────────────
const _featCache = {};

async function toggleFeatures(btn, epicRef, releaseRef) {
  const row = btn.closest('.epic-row');
  if (!row) return;
  const chevron = btn.querySelector('.epic-chevron');

  // Procurar ou criar o container de features
  let featsEl = row.nextElementSibling;
  if (!featsEl || !featsEl.classList.contains('epic-features')) {
    featsEl = document.createElement('div');
    featsEl.className = 'epic-features';
    row.after(featsEl);
  }

  const isOpen = featsEl.classList.contains('expanded');
  chevron?.classList.toggle('open', !isOpen);
  if (isOpen) { featsEl.classList.remove('expanded'); return; }
  featsEl.classList.add('expanded');

  if (featsEl.dataset.loaded) return; // já carregadas

  featsEl.innerHTML = '<div class="features-loading">A carregar features…</div>';
  try {
    // Cache por épico+release para não repetir chamadas
    const cacheKey = `${epicRef}__${releaseRef || 'all'}`;
    if (!_featCache[cacheKey]) {
      const d = await ahaGet(`epics/${epicRef}/features?fields=name,workflow_status,progress,release&per_page=200`);
      const all = d.features || [];
      // Filtrar apenas as features que pertencem à release desta meta
      _featCache[cacheKey] = releaseRef
        ? all.filter(f => (f.release?.reference_num || '') === releaseRef)
        : all;
    }
    const features = _featCache[cacheKey];
    featsEl.dataset.loaded = '1';
    featsEl.innerHTML = features.length
      ? features.map(f => {
          const si = getStatusInfo(f.workflow_status?.name);
          const p  = f.progress != null ? ` <span style="color:var(--muted);font-size:.68rem">${Math.round(f.progress)}%</span>` : '';
          return `<div class="feature-item"><span class="feature-dot ${si.cls}" title="${f.workflow_status?.name || '—'}"></span><span class="feature-name">${f.name}${p}</span></div>`;
        }).join('')
      : '<div class="feature-item" style="color:var(--muted);font-style:italic">Sem features nesta meta</div>';
  } catch(err) {
    featsEl.innerHTML = '<div class="feature-item" style="color:var(--risk-red)">Erro ao carregar</div>';
  }
}

// ─── HELPERS ───────────────────────────────────────────────────────
function formatDateRange(start, end) {
  const fmt = d => d ? d.toLocaleDateString('pt-PT', { day: 'numeric', month: 'short', year: 'numeric' }) : '?';
  if (start && end) return `${fmt(start)} → ${fmt(end)}`;
  if (start) return `A partir de ${fmt(start)}`;
  if (end)   return `Até ${fmt(end)}`;
  return '';
}

function showLoading() {
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div><p>A carregar roadmap…</p></div>';
  document.getElementById('errorBox').classList.remove('show');
}

function showError(msg) {
  document.getElementById('errorBox').textContent = msg;
  document.getElementById('errorBox').classList.add('show');
  document.getElementById('content').innerHTML = '';
}
